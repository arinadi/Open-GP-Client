name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev

      - name: Setup RPM build directory
        run: mkdir -p ~/rpmbuild/{SPECS,SOURCES,BUILD,RPMS,SRPMS}

      - name: Build Packages
        run: |
          make deb
          make rpm

      - name: Get Version
        id: vars
        run: |
          VERSION=$(git rev-list --count HEAD)
          echo "VERSION=1.$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v1.$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            *.deb
            /home/runner/rpmbuild/RPMS/*/*.rpm

      - name: Create Release
        if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag_name }}
          name: Release ${{ steps.vars.outputs.tag_name }}
          files: |
            *.deb
            /home/runner/rpmbuild/RPMS/*/*.rpm
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
